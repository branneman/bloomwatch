name: Contract tests (real WCL API)

on:
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:contract
        env:
          WCL_TEST_ACCESS_TOKEN: ${{ secrets.WCL_TEST_ACCESS_TOKEN }}
