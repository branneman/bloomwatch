name: CI & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history, not the default shallow clone — the build reads
          # the main-branch commit count into the footer's version string.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Wait for deployed site to be reachable
        # actions/deploy-pages@v5 returns once the deployment is registered as live, but
        # GitHub Pages' CDN can take a few more seconds to stop serving a stale edge-cached
        # response — a bare push straight into test:e2e occasionally hit that window and
        # failed on the first real-data assertion. Poll for a 200, then give the CDN a short
        # buffer to finish propagating before running the actual test.
        run: |
          url="${{ needs.deploy.outputs.page_url }}"
          for i in $(seq 1 12); do
            if curl -sf -o /dev/null "$url"; then
              echo "Site reachable after $i attempt(s); waiting 10s for CDN propagation."
              sleep 10
              exit 0
            fi
            sleep 5
          done
          echo "::error::Deployed site never became reachable at $url"
          exit 1
      - run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          WCL_TEST_ACCESS_TOKEN: ${{ secrets.WCL_TEST_ACCESS_TOKEN }}
